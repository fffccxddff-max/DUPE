name: 🔥 SSH via Cloudflared (قطعی)

on: workflow_dispatch

jobs:
  ssh:
    runs-on: ubuntu-latest
    steps:
      - name: نصب SSH Server
        run: |
          sudo apt update
          sudo apt install -y openssh-server curl

      - name: ساخت کاربر siamese
        run: |
          sudo useradd -m -s /bin/bash siamese
          echo "siamese:RezAYtL789" | sudo chpasswd
          sudo systemctl restart ssh

      - name: نصب cloudflared
        run: |
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: اجرای تونل TCP
        id: tunnel
        run: |
          cloudflared tunnel --url ssh://localhost:22 > tunnel.log 2>&1 &
          sleep 10
          HOST=$(grep -o 'https://[a-z0-9.-]*\.trycloudflare\.com' tunnel.log | head -1 | sed 's|https://||')
          if [ -z "$HOST" ]; then
            echo "خطا:"
            cat tunnel.log
            exit 1
          fi
          echo "host=$HOST" >> $GITHUB_OUTPUT

      - name: 🔐 نمایش دستور اتصال
        run: |
          echo ""
          echo "====================================================="
          echo "✅ تونل Cloudflared با موفقیت برقرار شد"
          echo "====================================================="
          echo ""
          echo "👤 کاربر: siamese"
          echo "🔑 رمز: RezAYtL789"
          echo ""
          echo "📌 در Termux (یا هر ترمینال لینوکسی) این دستور را بزن:"
          echo ""
          echo "ssh -o ProxyCommand=\"cloudflared access tcp --hostname %h\" siamese@${{ steps.tunnel.outputs.host }}"
          echo ""
          echo "⚠️  توجه:"
          echo "- اگر بار اول خواست host key را تایید کنی، yes بزن"
          echo "- تونل تا ۵ ساعت فعال است"
          echo "====================================================="

      - name: نگهداری جلسه
        run: sleep 18000
