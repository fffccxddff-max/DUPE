name: Build FPS Boost Mod Pro

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # ۱. رفع مشکل بهانه‌گیری گرادل
    - name: Create Temporary Settings File
      run: touch settings.gradle

    - name: Setup Gradle Wrapper (v8.9)
      run: gradle wrapper --gradle-version 8.9

    # ۲. ساخت ساختار پیشرفته مود فبریک نسخه 1.21.1
    - name: Generate Advanced Mod Files
      run: |
        echo "=== در حال تزریق کدهای پیشرفته بهینه‌سازی کلاینت ==="
        mkdir -p src/main/java/com/fpsboost/mixin
        mkdir -p src/main/resources

        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                maven { url "https://maven.fabricmc.net/" }
                mavenCentral()
            }
        }
        rootProject.name = "FPSBoostPro"
        EOF

        cat << 'EOF' > gradle.properties
        org.gradle.jvmargs=-Xmx2G
        EOF

        cat << 'EOF' > build.gradle
        plugins {
            id 'fabric-loom' version '1.7-SNAPSHOT'
        }
        version = '1.0.0'
        group = 'com.fpsboost'
        repositories { mavenCentral() }
        dependencies {
            minecraft "com.mojang:minecraft:1.21.1"
            mappings "net.fabricmc:yarn:1.21.1+build.2:v2"
            modImplementation "net.fabricmc:fabric-loader:0.16.0"
        }
        processResources {
            inputs.property "version", project.version
            filteringCharset "UTF-8"
            filesMatching("fabric.mod.json") { expand "version": project.version }
        }
        tasks.withType(JavaCompile).configureEach { it.options.release = 21 }
        EOF

        cat << 'EOF' > src/main/resources/fabric.mod.json
        {
          "schemaVersion": 1,
          "id": "fpsboost_pro",
          "version": "${version}",
          "name": "FPS Boost Pro",
          "description": "Ultra Performance Enhancer for PojavLauncher 1.21.1!",
          "authors": [ "kill_pv2" ],
          "contact": {},
          "license": "MIT",
          "environment": "client",
          "entrypoints": { "main": [] },
          "mixins": [ "fpsboost.mixins.json" ],
          "depends": { "fabricloader": ">=0.16.0", "minecraft": "1.21.1" }
        }
        EOF

        # ثبت هر ۳ میکس‌این جدید در فایل کانفیگ
        cat << 'EOF' > src/main/resources/fpsboost.mixins.json
        {
          "required": true,
          "minVersion": "0.8",
          "package": "com.fpsboost.mixin",
          "compatibilityLevel": "JAVA_21",
          "mixins": [ 
            "ParticleMixin",
            "BlockEntityRenderMixin",
            "HudMixin"
          ],
          "injectors": { "defaultRequire": 1 }
        }
        EOF

        # میکس‌این اول: حذف انیمیشن‌ها و ذرات دوردست برای جلوگیری از کرش و نشت حافظه
        cat << 'EOF' > src/main/java/com/fpsboost/mixin/ParticleMixin.java
        package com.fpsboost.mixin;

        import net.minecraft.client.MinecraftClient;
        import net.minecraft.client.particle.Particle;
        import org.spongepowered.asm.mixin.Mixin;
        import org.spongepowered.asm.mixin.Shadow;
        import org.spongepowered.asm.mixin.injection.At;
        import org.spongepowered.asm.mixin.injection.Inject;
        import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

        @Mixin(Particle.class)
        public abstract class ParticleMixin {
            @Shadow protected double x;
            @Shadow protected double y;
            @Shadow protected double z;

            @Inject(method = "tick", at = @At("HEAD"), cancellable = true)
            private void onTick(CallbackInfo ci) {
                try {
                    MinecraftClient client = MinecraftClient.getInstance();
                    if (client != null && client.player != null) {
                        double distanceSq = client.player.squaredDistanceTo(this.x, this.y, this.z);
                        // اگر ذرات دورتر از ۱۶ بلاک باشن تیک نمی‌خورن تا CPU/GPU موبایل آزاد بشه
                        if (distanceSq > 256) { ci.cancel(); }
                    }
                } catch (Exception e) {}
            }
        }
        EOF

        # میکس‌این دوم: حذف لگ چست‌ها و بلاک‌انتیتی‌های انباشته شده (کاهش شدید مصرف GPU)
        cat << 'EOF' > src/main/java/com/fpsboost/mixin/BlockEntityRenderMixin.java
        package com.fpsboost.mixin;

        import net.minecraft.block.entity.BlockEntity;
        import net.minecraft.client.MinecraftClient;
        import net.minecraft.client.render.block.entity.BlockEntityRenderDispatcher;
        import net.minecraft.client.render.VertexConsumerProvider;
        import net.minecraft.client.util.math.MatrixStack;
        import org.spongepowered.asm.mixin.Mixin;
        import org.spongepowered.asm.mixin.injection.At;
        import org.spongepowered.asm.mixin.injection.Inject;
        import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

        @Mixin(BlockEntityRenderDispatcher.class)
        public class BlockEntityRenderMixin {
            @Inject(method = "render", at = @At("HEAD"), cancellable = true)
            private <E extends BlockEntity> void onRenderBlockEntity(E blockEntity, float tickDelta, MatrixStack matrices, VertexConsumerProvider vertexConsumers, CallbackInfo ci) {
                try {
                    MinecraftClient client = MinecraftClient.getInstance();
                    if (client != null && client.player != null && blockEntity.getPos() != null) {
                        double distSq = client.player.squaredDistanceTo(blockEntity.getPos().getX(), blockEntity.getPos().getY(), blockEntity.getPos().getZ());
                        // کات کردن رندر چست‌ها و انتیتی‌های بلاک در فواصل دور (بزرگترین عامل دراپ FPS)
                        if (distSq > 1024) { ci.cancel(); }
                    }
                } catch (Exception e) {}
            }
        }
        EOF

        # میکس‌این سوم: نمایشگر فریم ریت اختصاصی روی صفحه و سازگار با بقیه کلاینت‌ها
        cat << 'EOF' > src/main/java/com/fpsboost/mixin/HudMixin.java
        package com.fpsboost.mixin;

        import net.minecraft.client.MinecraftClient;
        import net.minecraft.client.gui.DrawContext;
        import net.minecraft.client.gui.hud.InGameHud;
        import net.minecraft.client.render.RenderTickCounter;
        import org.spongepowered.asm.mixin.Mixin;
        import org.spongepowered.asm.mixin.injection.At;
        import org.spongepowered.asm.mixin.injection.Inject;
        import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

        @Mixin(InGameHud.class)
        public class HudMixin {
            @Inject(method = "render", at = @At("TAIL"))
            private void onRenderFpsCounter(DrawContext context, RenderTickCounter tickCounter, CallbackInfo ci) {
                try {
                    MinecraftClient client = MinecraftClient.getInstance();
                    if (client != null && !client.options.hudHidden && client.world != null) {
                        // گرفتن دقیق میزان فریم بدون ایجاد پینگ و لگ
                        String fpsText = "§aFPS: §f" + client.getCurrentFps();
                        // رندر کردن متن در مختصات فوق‌العاده امن (X=10, Y=10) تا با چیت‌کلاینت‌ها قاطی نشه
                        context.drawText(client.textRenderer, fpsText, 10, 10, 0xFFFFFF, true);
                    }
                } catch (Exception e) {}
            }
        }
        EOF
        echo "=== تمامی کدهای بهینه‌ساز با موفقیت تزریق شدند ==="

    # ۳. بیلد نهایی مود بدون اتلاف وقت
    - name: Build Mod with Gradle Wrapper
      run: ./gradlew build

    # ۴. آپلود فایل نهایی جار برای دانلود مستقیم
    - name: Upload Mod Jar Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FPS-Boost-Mod-Pro-1.21.1
        path: build/libs/*-1.0.0.jar
