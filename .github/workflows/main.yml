name: Build FPS Boost Mod Pro

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # ۱. رفع مشکل بهانه‌گیری گرادل
    - name: Create Temporary Settings File
      run: touch settings.gradle

    - name: Setup Gradle Wrapper (v8.9)
      run: gradle wrapper --gradle-version 8.9

    # ۲. ساخت ساختار پیشرفته مود فبریک نسخه 1.21.1 مخصوص جاوا 17
    - name: Generate Advanced Mod Files
      run: |
        echo "=== در حال تزریق کدهای پیشرفته بهینه‌سازی کلاینت ==="
        mkdir -p src/main/java/com/fpsboost/mixin
        mkdir -p src/main/java/com/fpsboost/ui
        mkdir -p src/main/resources

        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                maven { url "https://maven.fabricmc.net/" }
                mavenCentral()
            }
        }
        rootProject.name = "FPSBoostPro"
        EOF

        cat << 'EOF' > gradle.properties
        org.gradle.jvmargs=-Xmx2G
        EOF

        cat << 'EOF' > build.gradle
        plugins {
            id 'fabric-loom' version '1.7-SNAPSHOT'
        }
        version = '1.0.0'
        group = 'com.fpsboost'
        repositories { mavenCentral() }
        dependencies {
            minecraft "com.mojang:minecraft:1.21.1"
            mappings "net.fabricmc:yarn:1.21.1+build.2:v2"
            modImplementation "net.fabricmc:fabric-loader:0.16.0"
        }
        processResources {
            inputs.property "version", project.version
            filteringCharset "UTF-8"
            filesMatching("fabric.mod.json") { expand "version": project.version }
        }
        // تنظیم خروجی کامپایل دقیقاً روی جاوا 17 برای سازگاری کامل با پوجاو شما
        tasks.withType(JavaCompile).configureEach { it.options.release = 17 }
        EOF

        cat << 'EOF' > src/main/resources/fabric.mod.json
        {
          "schemaVersion": 1,
          "id": "fpsboost_pro",
          "version": "${version}",
          "name": "FPS Boost Pro",
          "description": "Ultra Performance Enhancer for PojavLauncher 1.21.1!",
          "authors": [ "kill_pv2" ],
          "contact": {},
          "license": "MIT",
          "environment": "client",
          "icon": "icon.png",
          "entrypoints": { "main": [] },
          "mixins": [ "fpsboost.mixins.json" ],
          "depends": { "fabricloader": ">=0.16.0", "minecraft": "1.21.1" }
        }
        EOF

        # مدیریت آیکون اختصاصی شما
        if [ -f "file_00000000d974722f95ee81adcf415ec7.png" ]; then
          cp file_00000000d974722f95ee81adcf415ec7.png src/main/resources/icon.png
        elif [ -f "icon.png" ]; then
          cp icon.png src/main/resources/icon.png
        elif [ -f "211097.png" ]; then
          cp 211097.png src/main/resources/icon.png
        else
          touch src/main/resources/icon.png
        fi

        # ثبت تمامی میکس‌این‌ها با لول سازگاری جاوا 17
        cat << 'EOF' > src/main/resources/fpsboost.mixins.json
        {
          "required": true,
          "minVersion": "0.8",
          "package": "com.fpsboost.mixin",
          "compatibilityLevel": "JAVA_17",
          "mixins": [ 
            "ParticleManagerMixin",
            "BlockEntityRenderMixin",
            "EntityRenderMixin",
            "HudMixin",
            "VideoOptionsMixin",
            "TextureManagerMixin",
            "MultiplayerScreenMixin"
          ],
          "injectors": { "defaultRequire": 1 }
        }
        EOF

        # میکس‌این ۱: حذف کامل پارتیکل‌ها (توتم، خرد شدن بلاک و...) برای مهار لگ فایت و اسپاون
        cat << 'EOF' > src/main/java/com/fpsboost/mixin/ParticleManagerMixin.java
        package com.fpsboost.mixin;

        import net.minecraft.client.particle.Particle;
        import net.minecraft.client.particle.ParticleManager;
        import org.spongepowered.asm.mixin.Mixin;
        import org.spongepowered.asm.mixin.injection.At;
        import org.spongepowered.asm.mixin.injection.Inject;
        import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

        @Mixin(ParticleManager.class)
        public class ParticleManagerMixin {
            @Inject(method = "addParticle(Lnet/minecraft/client/particle/Particle;)V", at = @At("HEAD"), cancellable = true)
            private void onAddParticle(Particle particle, CallbackInfo ci) {
                // حذف کامل تمامی پارتیک‌های سنگین مثل توتم پاپ و بلاک بریک برای جهش FPS
                ci.cancel();
            }
        }
        EOF

        # میکس‌این ۲: رندر نکردن چست‌ها و اندرچست‌ها وقتی پشت سر پلیر هستند
        cat << 'EOF' > src/main/java/com/fpsboost/mixin/BlockEntityRenderMixin.java
        package com.fpsboost.mixin;

        import net.minecraft.block.entity.BlockEntity;
        import net.minecraft.block.entity.ChestBlockEntity;
        import net.minecraft.block.entity.EnderChestBlockEntity;
        import net.minecraft.client.MinecraftClient;
        import net.minecraft.client.render.block.entity.BlockEntityRenderDispatcher;
        import net.minecraft.client.render.VertexConsumerProvider;
        import net.minecraft.client.util.math.MatrixStack;
        import org.spongepowered.asm.mixin.Mixin;
        import org.spongepowered.asm.mixin.injection.At;
        import org.spongepowered.asm.mixin.injection.Inject;
        import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

        @Mixin(BlockEntityRenderDispatcher.class)
        public class BlockEntityRenderMixin {
            @Inject(method = "render", at = @At("HEAD"), cancellable = true)
            private <E extends BlockEntity> void onRenderBlockEntity(E blockEntity, float tickDelta, MatrixStack matrices, VertexConsumerProvider vertexConsumers, CallbackInfo ci) {
                try {
                    MinecraftClient client = MinecraftClient.getInstance();
                    if (client != null && client.player != null && blockEntity.getPos() != null) {
                        if (blockEntity instanceof ChestBlockEntity || blockEntity instanceof EnderChestBlockEntity) {
                            double bx = blockEntity.getPos().getX() + 0.5;
                            double by = blockEntity.getPos().getY() + 0.5;
                            double bz = blockEntity.getPos().getZ() + 0.5;

                            net.minecraft.util.math.Vec3d lookVec = client.player.getRotationVec(1.0F);
                            net.minecraft.util.math.Vec3d toBlock = new net.minecraft.util.math.Vec3d(bx - client.player.getX(), by - client.player.getEyeY(), bz - client.player.getZ()).normalize();
                            
                            if (lookVec.dotProduct(toBlock) <= 0.0) {
                                ci.cancel();
                            }
                        }
                    }
                } catch (Exception e) {}
            }
        }
        EOF

        # میکس‌این ۳: رندر نکردن آرمور استندها (ArmorStand) وقتی پشت سر پلیر هستند
        cat << 'EOF' > src/main/java/com/fpsboost/mixin/EntityRenderMixin.java
        package com.fpsboost.mixin;

        import net.minecraft.client.render.entity.EntityRenderDispatcher;
        import net.minecraft.entity.decoration.ArmorStandEntity;
        import net.minecraft.client.MinecraftClient;
        import net.minecraft.client.util.math.MatrixStack;
        import net.minecraft.client.render.VertexConsumerProvider;
        import net.minecraft.entity.Entity;
        import org.spongepowered.asm.mixin.Mixin;
        import org.spongepowered.asm.mixin.injection.At;
        import org.spongepowered.asm.mixin.injection.Inject;
        import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

        @Mixin(EntityRenderDispatcher.class)
        public class EntityRenderMixin {
            @Inject(method = "render", at = @At("HEAD"), cancellable = true)
            private <E extends Entity> void onRenderEntity(E entity, double x, double y, double z, float yaw, float tickDelta, MatrixStack matrices, VertexConsumerProvider vertexConsumers, int light, CallbackInfo ci) {
                try {
                    if (entity instanceof ArmorStandEntity) {
                        MinecraftClient client = MinecraftClient.getInstance();
                        if (client != null && client.player != null) {
                            net.minecraft.util.math.Vec3d lookVec = client.player.getRotationVec(1.0F);
                            net.minecraft.util.math.Vec3d toEntity = new net.minecraft.util.math.Vec3d(entity.getX() - client.player.getX(), entity.getY() - client.player.getY(), entity.getZ() - client.player.getZ()).normalize();
                            
                            // اگر آرمور استند پشت سر پلیر باشه، رندرش لغو میشه
                            if (lookVec.dotProduct(toEntity) <= 0.0) {
                                ci.cancel();
                            }
                        }
                    }
                } catch (Exception e) {}
            }
        }
        EOF

        # میکس‌این ۴: نمایشگر بهینه و ثابت FPS روی دایره هاد
        cat << 'EOF' > src/main/java/com/fpsboost/mixin/HudMixin.java
        package com.fpsboost.mixin;

        import net.minecraft.client.MinecraftClient;
        import net.minecraft.client.gui.DrawContext;
        import net.minecraft.client.gui.hud.InGameHud;
        import net.minecraft.client.render.RenderTickCounter;
        import org.spongepowered.asm.mixin.Mixin;
        import org.spongepowered.asm.mixin.injection.At;
        import org.spongepowered.asm.mixin.injection.Inject;
        import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

        @Mixin(InGameHud.class)
        public class HudMixin {
            @Inject(method = "render", at = @At("TAIL"))
            private void onRenderFpsCounter(DrawContext context, RenderTickCounter tickCounter, CallbackInfo ci) {
                try {
                    MinecraftClient client = MinecraftClient.getInstance();
                    if (client != null && !client.options.hudHidden && client.world != null) {
                        String fpsText = "§aFPS: §f" + client.getCurrentFps();
                        context.drawText(client.textRenderer, fpsText, 10, 10, 0xFFFFFF, true);
                    }
                } catch (Exception e) {}
            }
        }
        EOF

        # میکس‌این ۵: دکمه تنظیمات خودکار هوشمند وسط بالای صفحه به همراه رفلکشن بدون خطای کامپایل
        cat << 'EOF' > src/main/java/com/fpsboost/mixin/VideoOptionsMixin.java
        package com.fpsboost.mixin;

        import net.minecraft.client.MinecraftClient;
        import net.minecraft.client.gui.screen.option.GameOptionsScreen;
        import net.minecraft.client.gui.screen.option.VideoOptionsScreen;
        import net.minecraft.client.gui.widget.ButtonWidget;
        import net.minecraft.text.Text;
        import org.spongepowered.asm.mixin.Mixin;
        import org.spongepowered.asm.mixin.injection.At;
        import org.spongepowered.asm.mixin.injection.Inject;
        import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

        @Mixin(GameOptionsScreen.class)
        public class VideoOptionsMixin extends net.minecraft.client.gui.screen.Screen {
            protected VideoOptionsMixin(Text title) { super(title); }

            @Inject(method = "init", at = @At("TAIL"))
            private void onInit(CallbackInfo ci) {
                try {
                    if ((Object)this instanceof VideoOptionsScreen) {
                        this.addDrawableChild(ButtonWidget.builder(Text.literal("§bKILL_PV2 Auto Optimize"), button -> {
                            MinecraftClient client = MinecraftClient.getInstance();
                            if (client != null && client.options != null) {
                                try { client.options.getViewDistance().setValue(2); } catch(Exception e){}
                                try { client.options.getSimulationDistance().setValue(4); } catch(Exception e){}
                                
                                try {
                                    Object graphicsOpt = client.options.getGraphicsMode();
                                    Object[] constants = graphicsOpt.getClass().getMethod("getValue").invoke(graphicsOpt).getClass().getEnumConstants();
                                    Object fastTarget = constants[0];
                                    for (Object c : constants) {
                                        if (c.toString().equalsIgnoreCase("FAST")) { fastTarget = c; break; }
                                    }
                                    for (java.lang.reflect.Method m : graphicsOpt.getClass().getMethods()) {
                                        if (m.getName().equals("setValue") && m.getParameterCount() == 1) {
                                            m.setAccessible(true); m.invoke(graphicsOpt, fastTarget); break;
                                        }
                                    }
                                } catch (Exception e) {}

                                try {
                                    Object aoOpt = client.options.getAo();
                                    Object[] constants = aoOpt.getClass().getMethod("getValue").invoke(aoOpt).getClass().getEnumConstants();
                                    Object offTarget = constants[0];
                                    for (Object c : constants) {
                                        if (c.toString().equalsIgnoreCase("OFF") || c.toString().equalsIgnoreCase("FALSE")) { offTarget = c; break; }
                                    }
                                    for (java.lang.reflect.Method m : aoOpt.getClass().getMethods()) {
                                        if (m.getName().equals("setValue") && m.getParameterCount() == 1) {
                                            m.setAccessible(true); m.invoke(aoOpt, offTarget); break;
                                        }
                                    }
                                } catch (Exception e) {}
                                
                                if (client.worldRenderer != null) { client.worldRenderer.reload(); }
                                client.options.write();
                                this.close();
                            }
                        }).dimensions(this.width / 2 - 80, 6, 160, 20).build());
                    }
                } catch (Exception e) {}
            }
        }
        EOF

        # میکس‌این ۶: پاکسازی زباله‌های مموری برای مهار لگ ترنزیشن‌ها و منوها
        cat << 'EOF' > src/main/java/com/fpsboost/mixin/TextureManagerMixin.java
        package com.fpsboost.mixin;

        import net.minecraft.client.texture.TextureManager;
        import org.spongepowered.asm.mixin.Mixin;
        import org.spongepowered.asm.mixin.injection.At;
        import org.spongepowered.asm.mixin.injection.Inject;
        import org.spongepowered.asm.mixin.injection.callback.CallbackInfoReturnable;

        @Mixin(TextureManager.class)
        public class TextureManagerMixin {
            @Inject(method = "reload", at = @At("HEAD"))
            private void onReloadTexturesHead(CallbackInfoReturnable<?> cir) {
                System.gc();
            }
        }
        EOF

        # میکس‌این ۷: تزریق دکمه پراکسی V2Ray در منوی مولتی‌پلیر بازی
        cat << 'EOF' > src/main/java/com/fpsboost/mixin/MultiplayerScreenMixin.java
        package com.fpsboost.mixin;

        import net.minecraft.client.gui.screen.multiplayer.MultiplayerScreen;
        import net.minecraft.client.gui.screen.Screen;
        import net.minecraft.client.gui.widget.ButtonWidget;
        import net.minecraft.text.Text;
        import com.fpsboost.ui.V2RayScreen;
        import org.spongepowered.asm.mixin.Mixin;
        import org.spongepowered.asm.mixin.injection.At;
        import org.spongepowered.asm.mixin.injection.Inject;
        import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

        @Mixin(MultiplayerScreen.class)
        public class MultiplayerScreenMixin extends Screen {
            protected MultiplayerScreenMixin(Text title) { super(title); }

            @Inject(method = "init", at = @At("TAIL"))
            private void onInit(CallbackInfo ci) {
                try {
                    // افزودن دکمه ورود کانفیگ به گوشه سمت چپ بالای منوی سرورها
                    this.addDrawableChild(ButtonWidget.builder(Text.literal("§bV2Ray Proxy"), button -> {
                        this.client.setScreen(new V2RayScreen(this));
                    }).dimensions(5, 5, 85, 20).build());
                } catch (Exception e) {}
            }
        }
        EOF

        # ساخت فایل رابط کاربری اختصاصی برای بخش تنظیمات کانفیگ V2Ray
        cat << 'EOF' > src/main/java/com/fpsboost/ui/V2RayScreen.java
        package com.fpsboost.ui;

        import net.minecraft.client.gui.screen.Screen;
        import net.minecraft.client.gui.widget.ButtonWidget;
        import net.minecraft.client.gui.widget.TextFieldWidget;
        import net.minecraft.text.Text;
        import net.minecraft.client.MinecraftClient;
        import java.io.File;
        import java.io.FileWriter;
        import java.util.Scanner;

        public class V2RayScreen extends Screen {
            private final Screen parent;
            private TextFieldWidget configInput;
            public static String savedConfig = "";

            public V2RayScreen(Screen parent) {
                super(Text.literal("V2Ray Proxy Configuration"));
                this.parent = parent;
            }

            @Override
            protected void init() {
                // لود کردن کانفیگ قبلی در صورت وجود
                if (savedConfig.isEmpty()) {
                    try {
                        File file = new File(MinecraftClient.getInstance().runDirectory, "v2ray_config.txt");
                        if (file.exists()) {
                            Scanner scanner = new Scanner(file);
                            if (scanner.hasNextLine()) savedConfig = scanner.nextLine();
                            scanner.close();
                        }
                    } catch(Exception e){}
                }

                // ایجاد فیلد متنی برای چسباندن آی‌پی و پورت پراکسی محلی (مثل 127.0.0.1:10808)
                this.configInput = new TextFieldWidget(this.textRenderer, this.width / 2 - 150, this.height / 2 - 10, 300, 20, Text.literal("Proxy Host:Port"));
                this.configInput.setMaxLength(256);
                this.configInput.setText(savedConfig);
                this.addDrawableChild(this.configInput);

                // دکمه ذخیره و اعمال آنی پراکسی روی شبکه کلاینت ماینکرفت
                this.addDrawableChild(ButtonWidget.builder(Text.literal("§aSave & Apply"), button -> {
                    savedConfig = this.configInput.getText();
                    try {
                        File file = new File(MinecraftClient.getInstance().runDirectory, "v2ray_config.txt");
                        FileWriter writer = new FileWriter(file);
                        writer.write(savedConfig);
                        writer.close();
                        
                        if (savedConfig.contains(":")) {
                            String[] parts = savedConfig.split(":");
                            System.setProperty("socksProxyHost", parts[0].trim());
                            System.setProperty("socksProxyPort", parts[1].trim());
                        } else if (savedConfig.isEmpty()) {
                            System.clearProperty("socksProxyHost");
                            System.clearProperty("socksProxyPort");
                        }
                    } catch(Exception e){}
                    this.client.setScreen(this.parent);
                }).dimensions(this.width / 2 - 105, this.height / 2 + 25, 100, 20).build());

                // دکمه انصراف و برگشت
                this.addDrawableChild(ButtonWidget.builder(Text.literal("Cancel"), button -> {
                    this.client.setScreen(this.parent);
                }).dimensions(this.width / 2 + 5, this.height / 2 + 25, 100, 20).build());
            }

            @Override
            public void render(net.minecraft.client.gui.DrawContext context, int mouseX, int mouseY, float delta) {
                this.renderBackground(context, mouseX, mouseY, delta);
                context.drawCenteredTextWithShadow(this.textRenderer, this.title, this.width / 2, 20, 0xFFFFFF);
                context.drawCenteredTextWithShadow(this.textRenderer, "Enter local SOCKS proxy (e.g. 127.0.0.1:10808) for V2Ray bypass:", this.width / 2, this.height / 2 - 30, 0xAAAAAA);
                super.render(context, mouseX, mouseY, delta);
            }
        }
        EOF
        echo "=== تمامی کدهای بهینه‌ساز با موفقیت تزریق شدند ==="

    # ۳. بیلد نهایی مود بدون اتلاف وقت
    - name: Build Mod with Gradle Wrapper
      run: ./gradlew build

    # ۴. آپلود فایل نهایی جار برای دانلود مستقیم
    - name: Upload Mod Jar Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FPS-Boost-Mod-Extreme-Java17-1.21.1
        path: build/libs/*-1.0.0.jar
