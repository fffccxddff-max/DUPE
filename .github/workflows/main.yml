name: Siamese Runner with SSH (Cloudflare Tunnel)

on: workflow_dispatch

jobs:
  ssh-tunnel:
    runs-on: ubuntu-latest
    steps:
      - name: نصب SSH server
        run: |
          sudo apt update
          sudo apt install -y openssh-server curl

      - name: تنظیم SSH user
        run: |
          sudo useradd -m -s /bin/bash siamese
          echo "siamese:tempPass123" | sudo chpasswd
          sudo systemctl restart ssh

      - name: نصب cloudflared
        run: |
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: ایجاد تونل SSH و نمایش آدرس
        run: |
          # اجرا در پس‌زمینه و گرفتن آدرس
          nohup cloudflared tunnel --url ssh://localhost:22 --logfile cloudflared.log &
          sleep 8
          # استخراج آدرس از لاگ
          URL=$(grep -o 'https://[-a-zA-Z0-9.]*\.trycloudflare\.com' cloudflared.log | head -1)
          echo "✅ تونل فعال شد!"
          echo "آدرس اتصال SSH: $URL"
          echo "با دستور زیر وصل شو:"
          echo "ssh -o ProxyCommand='cloudflared access ssh --hostname %h' siamese@${URL#https://}"
          echo "یا ساده‌تر:"
          echo "ssh siamese@${URL#https://}"
          echo "رمز: tempPass123"
          echo "⚠️  تونل تا ۵ ساعت فعال می‌ماند."

      - name: نگه‌داری workflow تا قطع اتصال
        run: |
          echo "منتظر اتصال کاربر هستم..."
          while true; do
            if who | grep -q siamese; then
              echo "کاربر متصل است."
              sleep 60
            else
              echo "هیچ کاربری متصل نیست. در حال انتظار..."
              sleep 30
            fi
          done
