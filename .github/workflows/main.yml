name: Build FPS Boost Mod Pro

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Generate Project Files
      run: |
        mkdir -p src/main/java/com/fpsboost/mixin
        mkdir -p src/main/resources

        cat > settings.gradle << 'EOF'
        pluginManagement {
            repositories {
                maven { url "https://maven.fabricmc.net/" }
                gradlePluginPortal()
                mavenCentral()
            }
        }
        rootProject.name = "FPSBoostPro"
        EOF

        cat > gradle.properties << 'EOF'
        org.gradle.jvmargs=-Xmx2G -XX:+UseG1GC
        org.gradle.parallel=true
        org.gradle.caching=true
        org.gradle.daemon=false
        EOF

        cat > build.gradle << 'EOF'
        plugins {
            id 'fabric-loom' version '1.7.4'
            id 'java'
        }

        version = '1.0.0'
        group = 'com.fpsboost'
        base { archivesName = 'fpsboost-pro' }

        repositories {
            mavenCentral()
            maven { url "https://maven.fabricmc.net/" }
        }

        dependencies {
            minecraft "com.mojang:minecraft:1.21.1"
            mappings "net.fabricmc:yarn:1.21.1+build.3:v2"
            modImplementation "net.fabricmc:fabric-loader:0.16.0"
        }

        processResources {
            inputs.property "version", project.version
            filteringCharset "UTF-8"
            filesMatching("fabric.mod.json") {
                expand "version": project.version
            }
        }

        java {
            sourceCompatibility = JavaVersion.VERSION_17
            targetCompatibility = JavaVersion.VERSION_17
        }

        tasks.withType(JavaCompile).configureEach {
            it.options.release = 17
            it.options.encoding = "UTF-8"
        }
        EOF

        cat > src/main/resources/fabric.mod.json << 'EOF'
        {
          "schemaVersion": 1,
          "id": "fpsboost_pro",
          "version": "${version}",
          "name": "FPS Boost Pro",
          "description": "Lightweight Performance Helper for PojavLauncher 1.21.1",
          "authors": [ "kill_pv2" ],
          "contact": {},
          "license": "MIT",
          "environment": "client",
          "icon": "icon.png",
          "entrypoints": { "main": [] },
          "mixins": [ "fpsboost.mixins.json" ],
          "depends": {
            "fabricloader": ">=0.16.0",
            "minecraft": "1.21.1"
          }
        }
        EOF

        if [ -f "icon.png" ]; then
          cp icon.png src/main/resources/icon.png
        else
          touch src/main/resources/icon.png
        fi

        cat > src/main/resources/fpsboost.mixins.json << 'EOF'
        {
          "required": true,
          "minVersion": "0.8",
          "package": "com.fpsboost.mixin",
          "compatibilityLevel": "JAVA_17",
          "client": [
            "ParticleMixin",
            "HudMixin",
            "VideoOptionsMixin"
          ],
          "injectors": { "defaultRequire": 0 }
        }
        EOF

    - name: Generate Mixin Java Files
      run: |
        # ── ParticleMixin: cull particles far away (safe, low conflict) ──
        cat > src/main/java/com/fpsboost/mixin/ParticleMixin.java << 'EOF'
        package com.fpsboost.mixin;

        import net.minecraft.client.MinecraftClient;
        import net.minecraft.client.particle.Particle;
        import org.spongepowered.asm.mixin.Mixin;
        import org.spongepowered.asm.mixin.Shadow;
        import org.spongepowered.asm.mixin.injection.At;
        import org.spongepowered.asm.mixin.injection.Inject;
        import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

        @Mixin(Particle.class)
        public abstract class ParticleMixin {
            @Shadow protected double x;
            @Shadow protected double y;
            @Shadow protected double z;

            @Inject(method = "tick", at = @At("HEAD"), cancellable = true, require = 0)
            private void fpsboost$onTick(CallbackInfo ci) {
                try {
                    MinecraftClient client = MinecraftClient.getInstance();
                    if (client != null && client.player != null) {
                        double distSq = client.player.squaredDistanceTo(this.x, this.y, this.z);
                        if (distSq > 256.0) { // 16 blocks
                            ci.cancel();
                        }
                    }
                } catch (Exception ignored) {}
            }
        }
        EOF

        # ── HudMixin: FPS counter (safe, TAIL inject) ──
        cat > src/main/java/com/fpsboost/mixin/HudMixin.java << 'EOF'
        package com.fpsboost.mixin;

        import net.minecraft.client.MinecraftClient;
        import net.minecraft.client.gui.DrawContext;
        import net.minecraft.client.gui.hud.InGameHud;
        import net.minecraft.client.render.RenderTickCounter;
        import org.spongepowered.asm.mixin.Mixin;
        import org.spongepowered.asm.mixin.injection.At;
        import org.spongepowered.asm.mixin.injection.Inject;
        import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

        @Mixin(InGameHud.class)
        public class HudMixin {

            @Inject(method = "render", at = @At("TAIL"), require = 0)
            private void fpsboost$onRender(DrawContext context, RenderTickCounter tickCounter, CallbackInfo ci) {
                try {
                    MinecraftClient client = MinecraftClient.getInstance();
                    if (client == null || client.options.hudHidden || client.world == null) return;

                    int fps = client.getCurrentFps();
                    String color = fps >= 30 ? "§a" : fps >= 15 ? "§e" : "§c";
                    String text = color + "FPS: §f" + fps;
                    context.drawText(client.textRenderer, text, 4, 4, 0xFFFFFF, true);
                } catch (Exception ignored) {}
            }
        }
        EOF

        # ── VideoOptionsMixin: Auto Optimize button ──
        cat > src/main/java/com/fpsboost/mixin/VideoOptionsMixin.java << 'EOF'
        package com.fpsboost.mixin;

        import net.minecraft.client.MinecraftClient;
        import net.minecraft.client.gui.screen.option.GameOptionsScreen;
        import net.minecraft.client.gui.screen.option.VideoOptionsScreen;
        import net.minecraft.client.gui.widget.ButtonWidget;
        import net.minecraft.client.option.GraphicsMode;
        import net.minecraft.text.Text;
        import org.spongepowered.asm.mixin.Mixin;
        import org.spongepowered.asm.mixin.injection.At;
        import org.spongepowered.asm.mixin.injection.Inject;
        import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

        @Mixin(GameOptionsScreen.class)
        public abstract class VideoOptionsMixin extends net.minecraft.client.gui.screen.Screen {

            protected VideoOptionsMixin(Text title) {
                super(title);
            }

            @Inject(method = "init", at = @At("TAIL"), require = 0)
            private void fpsboost$onInit(CallbackInfo ci) {
                try {
                    if (!((Object) this instanceof VideoOptionsScreen)) return;

                    this.addDrawableChild(
                        ButtonWidget.builder(Text.literal("§b⚡ Auto Optimize"), button -> {
                            MinecraftClient client = MinecraftClient.getInstance();
                            if (client == null || client.options == null) return;

                            client.options.getViewDistance().setValue(4);
                            client.options.getSimulationDistance().setValue(5);
                            client.options.getGraphicsMode().setValue(GraphicsMode.FAST);
                            client.options.getAo().setValue(false);
                            client.options.getCloudRenderMode().setValue(
                                net.minecraft.client.option.CloudRenderMode.OFF
                            );
                            client.options.getEntityShadows().setValue(false);

                            if (client.worldRenderer != null) {
                                client.worldRenderer.reload();
                            }
                            client.options.write();
                            this.close();
                        })
                        .dimensions(this.width / 2 - 80, 6, 160, 20)
                        .build()
                    );
                } catch (Exception ignored) {}
            }
        }
        EOF

        echo "=== All mod files generated ==="

    - name: Build Mod
      run: ./gradlew build --no-daemon --stacktrace

    - name: Upload Mod Jar
      uses: actions/upload-artifact@v4
      with:
        name: FPS-Boost-Pro-Java17-MC1.21.1
        path: build/libs/fpsboost-pro-1.0.0.jar
        if-no-files-found: error
