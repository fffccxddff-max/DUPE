name: 🔥 SSH via Cloudflared TCP (نهایی)

on: workflow_dispatch

jobs:
  ssh:
    runs-on: ubuntu-latest
    steps:
      - name: نصب SSH Server
        run: |
          sudo apt update
          sudo apt install -y openssh-server curl net-tools

      - name: ساخت کاربر siamese و تنظیمات دسترسی
        run: |
          # ساخت یوزر siamese با دایرکتوری خانگی و پوسته بش
          sudo useradd -m -s /bin/bash siamese
          echo "siamese:RezAYtL789" | sudo chpasswd
          # دادن دسترسی سودو به کاربر
          sudo usermod -aG sudo siamese

      - name: پیکربندی و اجرای دستی و مطمئن سرویس SSH
        run: |
          # متوقف کردن سرویس‌های پیش‌فرض سیستم‌د برای آزاد شدن کامل پورت ۲۲
          sudo systemctl stop ssh || true
          sudo systemctl stop ssh.socket || true
          
          # ساخت دایرکتوری مورد نیاز SSH برای اجرا
          sudo mkdir -p /var/run/sshd
          
          # تولید کلیدهای هاست در صورت عدم وجود
          sudo ssh-keygen -A
          
          # نوشتن کانفیگ ساده، مدرن و ۱۰۰٪ سازگار با اوبونتوهای جدید
          sudo bash -c 'cat <<EOF > /etc/ssh/sshd_config
          Port 22
          ListenAddress 0.0.0.0
          Protocol 2
          PermitRootLogin yes
          PasswordAuthentication yes
          PubkeyAuthentication yes
          ChallengeResponseAuthentication no
          UsePAM yes
          X11Forwarding yes
          Subsystem sftp /usr/lib/openssh/sftp-server
          EOF'
          
          # تست صحت کانفیگ جهت اطمینان از عدم وجود ارور ساختاری
          sudo /usr/sbin/sshd -t
          
          # اجرای مستقیم سرویس SSH در پس‌زمینه (دور زدن تمام محدودیت‌های سیستم‌د گیت‌هاب)
          sudo /usr/sbin/sshd -D &
          
          # چند ثانیه صبر و بررسی باز بودن پورت ۲۲
          sleep 3
          echo "=== وضعیت پورت‌های سیستم ==="
          sudo netstat -tuln | grep :22 || echo "پورت ۲۲ فعال نشد!"

      - name: نصب cloudflared
        run: |
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: اجرای تونل TCP (تصحیح شده)
        id: tunnel
        run: |
          # اجرای کلودفلرد در پس‌زمینه
          nohup cloudflared tunnel --url tcp://localhost:22 > tunnel.log 2>&1 &
          
          # منتظر ماندن برای ایجاد تونل
          sleep 12
          
          echo "=== لاگ خام کلودفلر ==="
          cat tunnel.log
          echo "======================================"
          
          # استخراج تمیز ساب‌دومین بدون هیچ پیشوندی
          HOST=$(grep -oE '[a-zA-Z0-9.-]+\.trycloudflare\.com' tunnel.log | head -n 1)
          
          if [ -z "$HOST" ]; then
            echo "❌ خطا: آدرس تونل یافت نشد!"
            exit 1
          fi
          
          echo "آدرس پیدا شده: $HOST"
          echo "host=$HOST" >> $GITHUB_OUTPUT

      - name: نمایش دستور اتصال
        run: |
          echo ""
          echo "====================================================="
          echo "✅ تونل TCP با موفقیت و پایداری کامل برقرار شد"
          echo "====================================================="
          echo "👤 کاربر: siamese"
          echo "🔑 رمز عبور: RezAYtL789"
          echo "🌐 آدرس هاست: ${{ steps.tunnel.outputs.host }}"
          echo "====================================================="
          echo ""
          echo "دستور اتصال مستقیم در Termux یا ترمینال سیستم شما:"
          echo "ssh -o ProxyCommand=\"cloudflared access tcp --hostname %h\" siamese@${{ steps.tunnel.outputs.host }}"
          echo ""
          echo "====================================================="

      - name: نگهداری (مدت زمان فعال بودن سرور)
        run: sleep 18000
