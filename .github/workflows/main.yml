name: Build and Auto-Test FPS Boost Mod

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # ۱. رفع مشکل بهانه‌گیری گرادل ۹
    - name: Create Temporary Settings File
      run: touch settings.gradle

    - name: Setup Gradle Wrapper (v8.9)
      run: gradle wrapper --gradle-version 8.9

    # ۲. ساخت فایل‌های سورس کد مود فبریک
    - name: Generate Project Structure and Files
      run: |
        echo "=== در حال ساخت پوشه‌ها و تزریق کدها ==="
        mkdir -p src/main/java/com/fpsboost/mixin
        mkdir -p src/main/resources

        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                maven { url "https://maven.fabricmc.net/" }
                mavenCentral()
            }
        }
        rootProject.name = "FPSBoostPro"
        EOF

        cat << 'EOF' > gradle.properties
        org.gradle.jvmargs=-Xmx2G
        EOF

        cat << 'EOF' > build.gradle
        plugins {
            id 'fabric-loom' version '1.7-SNAPSHOT'
        }
        version = '1.0.0'
        group = 'com.fpsboost'
        repositories { mavenCentral() }
        dependencies {
            minecraft "com.mojang:minecraft:1.21.1"
            mappings "net.fabricmc:yarn:1.21.1+build.2:v2"
            modImplementation "net.fabricmc:fabric-loader:0.16.0"
        }
        processResources {
            inputs.property "version", project.version
            filteringCharset "UTF-8"
            filesMatching("fabric.mod.json") { expand "version": project.version }
        }
        tasks.withType(JavaCompile).configureEach { it.options.release = 21 }
        EOF

        cat << 'EOF' > src/main/resources/fabric.mod.json
        {
          "schemaVersion": 1,
          "id": "fpsboost_pro",
          "version": "${version}",
          "name": "FPS Boost Pro",
          "description": "Custom performance enhancer for PojavLauncher!",
          "authors": [ "kill_pv2" ],
          "contact": {},
          "license": "MIT",
          "environment": "client",
          "entrypoints": { "main": [] },
          "mixins": [ "fpsboost.mixins.json" ],
          "depends": { "fabricloader": ">=0.16.0", "minecraft": "1.21.1" }
        }
        EOF

        cat << 'EOF' > src/main/resources/fpsboost.mixins.json
        {
          "required": true,
          "minVersion": "0.8",
          "package": "com.fpsboost.mixin",
          "compatibilityLevel": "JAVA_21",
          "mixins": [ "ParticleMixin" ],
          "injectors": { "defaultRequire": 1 }
        }
        EOF

        cat << 'EOF' > src/main/java/com/fpsboost/mixin/ParticleMixin.java
        package com.fpsboost.mixin;

        import net.minecraft.client.MinecraftClient;
        import net.minecraft.client.particle.Particle;
        import org.spongepowered.asm.mixin.Mixin;
        import org.spongepowered.asm.mixin.Shadow;
        import org.spongepowered.asm.mixin.injection.At;
        import org.spongepowered.asm.mixin.injection.Inject;
        import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

        @Mixin(Particle.class)
        public abstract class ParticleMixin {
            @Shadow protected double x;
            @Shadow protected double y;
            @Shadow protected double z;

            @Inject(method = "tick", at = @At("HEAD"), cancellable = true)
            private void onTick(CallbackInfo ci) {
                MinecraftClient client = MinecraftClient.getInstance();
                if (client.player != null) {
                    double distanceSq = client.player.squaredDistanceTo(this.x, this.y, this.z);
                    if (distanceSq > 1024) { ci.cancel(); }
                }
            }
        }
        EOF
        echo "=== فایل‌های مود با موفقیت ساخته شدند ==="

    # ۳. بیلد کردن مود و تولید فایل jar
    - name: Build Mod with Gradle Wrapper
      run: ./gradlew build

    # ۴. نصب نیازمندی‌ها + پکیج‌های شبیه‌ساز گرافیک Mesa و ترمینال xterm
    - name: Install Test Environment Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb fluxbox x11vnc novnc websockify wget xterm python3-pip
        sudo apt-get install -y libgl1-mesa-dri libglx-mesa0 libgbm1 mesa-utils
        pip3 install portablemc --break-system-packages
        
        # نصب کلودفلر
        wget https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        sudo dpkg -i cloudflared-linux-amd64.deb

    # ۵. آماده‌سازی پوشه‌های کلاینت و انتقال مود
    - name: Prepare Vanilla and Modded Instances
      run: |
        mkdir -p test_env/vanilla
        mkdir -p test_env/modded/mods
        
        # کپی کردن مود بیلد شده به پوشه اینستنس مود شده
        cp build/libs/*-1.0.0.jar test_env/modded/mods/fpsboost_pro.jar

    # ۶. اجرای یکپارچه محیط گرافیکی، تونل کلودفلر و لاگ زنده در دسکتاپ
    - name: Start Virtual Desktop, Cloudflare Tunnel and Launch Minecraft
      run: |
        echo "=== ۱. راه‌اندازی مانیتور مجازی ==="
        Xvfb :1 -screen 0 1920x1080x24 &
        sleep 3
        export DISPLAY=:1
        fluxbox &
        sleep 2
        
        echo "=== ۲. راه‌اندازی VNC Server ==="
        x11vnc -display :1 -nopw -forever -shared -bg -rfbport 5900
        sleep 2
        
        echo "=== ۳. راه‌اندازی وب‌سرور دسکتاپ (noVNC) ==="
        websockify --web /usr/share/novnc 8060 localhost:5900 &
        sleep 3
        
        echo "=== ۴. ایجاد تونل موقت کلودفلر ==="
        cloudflared tunnel --url http://localhost:8060 > cloudflare.log 2>&1 &
        sleep 8
        
        echo "=========================================================="
        echo "آدرس ورود به محیط تست گرافیکی کلاینت:"
        grep -o 'https://[-a-z0-9.]*.trycloudflare.com' cloudflare.log || cat cloudflare.log
        echo "=========================================================="
        
        echo "=== ۵. اجرای دانلود و ران کردن ماینکرفت‌ها درون پنجره‌های ترمینال زنده ==="
        
        # اجرای کلاینت وانیلا با دستور درست start
        xterm -geometry 90x25+50+100 -title "Vanilla Minecraft Status" -e "portablemc start 1.21.1 -u Vanilla_Test --offline --workdir ./test_env/vanilla --jvm-args='-Xmx3G -Xms1G'; echo 'Process Finished. Press Enter to close...'; read" &
        sleep 3
        
        # اجرای کلاینت مود شده با دستور درست start
        xterm -geometry 90x25+1000+100 -title "Modded Fabric Minecraft Status" -e "portablemc start fabric:1.21.1 -u Modded_Test --offline --workdir ./test_env/modded --jvm-args='-Xmx3G -Xms1G'; echo 'Process Finished. Press Enter to close...'; read" &
        
        echo "محیط تست گرافیکی با موفقیت بالا آمد. شل به مدت ۳۰ دقیقه باز نگه‌داشته می‌شود..."
        sleep 1800

    # ۷. آپلود فایل مود برای دانلود مستقیم
    - name: Upload Mod Jar Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FPS-Boost-Mod-1.21.1
        path: build/libs/*-1.0.0.jar
