name: 🔥 SSH Connect to Runner

on: workflow_dispatch

jobs:
  ssh:
    runs-on: ubuntu-latest
    steps:
      - name: راه‌اندازی SSH Server
        run: |
          sudo apt update
          sudo apt install -y openssh-server curl

      - name: ساخت کاربر siamese با رمز یکبارمصرف
        run: |
          sudo useradd -m -s /bin/bash siamese
          echo "siamese:RezAYtL789" | sudo chpasswd
          sudo systemctl restart ssh

      - name: نصب Cloudflared
        run: |
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: اجرای تونل و گرفتن آدرس
        id: tunnel
        run: |
          cloudflared tunnel --url ssh://localhost:22 > tunnel.log 2>&1 &
          sleep 10
          URL=$(grep -o 'https://[a-z0-9.-]*\.trycloudflare\.com' tunnel.log | head -1)
          HOST=$(echo $URL | sed 's|https://||')
          echo "HOST=$HOST" >> $GITHUB_OUTPUT
          echo "TUNNEL_HOST=$HOST" >> $GITHUB_ENV

      - name: 🔐 نمایش دستور اتصال (کپی کن)
        run: |
          echo ""
          echo "====================================================="
          echo "✅ تونل با موفقیت برقرار شد"
          echo "====================================================="
          echo ""
          echo "👤 کاربر: siamese"
          echo "🔑 رمز: RezAYtL789"
          echo ""
          echo "📌 در ترمینال خودت (Termux یا هر جایی) این دستور را بزن:"
          echo ""
          echo "   ssh siamese@${{ steps.tunnel.outputs.HOST }}"
          echo ""
          echo "بعد از درخواست رمز، عبارت RezAYtL789 را وارد کن."
          echo ""
          echo "⚠️  تونل تا ۵ ساعت فعال است."
          echo "====================================================="

      - name: نگه‌داری جلسه
        run: sleep 18000
