name: Auto Build FPS Boost Mod

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # این دکمه اجرای دستی رو توی پنل گیت‌هاب فعال می‌کنه

jobs:
  build-mod:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Generate Project Structure and Files
      run: |
        echo "=== در حال ساخت پوشه‌ها و تزریق کدها ==="
        
        # ۱. ساخت پوشه‌های ساختاری پروژه فبریک
        mkdir -p src/main/java/com/fpsboost/mixin
        mkdir -p src/main/resources

        # ۲. ساخت فایل settings.gradle
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                maven { url "https://maven.fabricmc.net/" }
                mavenCentral()
            }
        }
        rootProject.name = "FPSBoostPro"
        EOF

        # ۳. ساخت فایل gradle.properties
        cat << 'EOF' > gradle.properties
        org.gradle.jvmargs=-Xmx2G
        EOF

        # ۴. ساخت فایل build.gradle
        cat << 'EOF' > build.gradle
        plugins {
            id 'fabric-loom' version '1.7-SNAPSHOT'
        }

        version = '1.0.0'
        group = 'com.fpsboost'

        repositories {
            mavenCentral()
        }

        dependencies {
            minecraft "com.mojang:minecraft:1.21.1"
            mappings "net.fabricmc:yarn:1.21.1+build.2:v2"
            modImplementation "net.fabricmc:fabric-loader:0.16.0"
        }

        processResources {
            inputs.property "version", project.version
            filteringCharset "UTF-8"

            filesMatching("fabric.mod.json") {
                expand "version": project.version
            }
        }

        tasks.withType(JavaCompile).configureEach {
            it.options.release = 21
        }
        EOF

        # ۵. ساخت فایل fabric.mod.json
        cat << 'EOF' > src/main/resources/fabric.mod.json
        {
          "schemaVersion": 1,
          "id": "fpsboost_pro",
          "version": "${version}",
          "name": "FPS Boost Pro",
          "description": "Custom performance enhancer for PojavLauncher!",
          "authors": [ "kill_pv2" ],
          "contact": {},
          "license": "MIT",
          "environment": "client",
          "entrypoints": {
            "main": []
          },
          "mixins": [
            "fpsboost.mixins.json"
          ],
          "depends": {
            "fabricloader": ">=0.16.0",
            "minecraft": "1.21.1"
          }
        }
        EOF

        # ۶. ساخت فایل تنظیمات میکسین fpsboost.mixins.json
        cat << 'EOF' > src/main/resources/fpsboost.mixins.json
        {
          "required": true,
          "minVersion": "0.8",
          "package": "com.fpsboost.mixin",
          "compatibilityLevel": "JAVA_21",
          "mixins": [
            "ParticleMixin"
          ],
          "injectors": {
            "defaultRequire": 1
          }
        }
        EOF

        # ۷. تزریق کد جاوای اصلی (میکسین بهینه‌سازی ذرات)
        cat << 'EOF' > src/main/java/com/fpsboost/mixin/ParticleMixin.java
        package com.fpsboost.mixin;

        import net.minecraft.client.MinecraftClient;
        import net.minecraft.client.particle.Particle;
        import org.spongepowered.asm.mixin.Mixin;
        import org.spongepowered.asm.mixin.Shadow;
        import org.spongepowered.asm.mixin.injection.At;
        import org.spongepowered.asm.mixin.injection.Inject;
        import org.spongepowered.asm.mixin.injection.callback.CallbackInfo;

        @Mixin(Particle.class)
        public abstract class ParticleMixin {
            
            @Shadow protected double x;
            @Shadow protected double y;
            @Shadow protected double z;

            @Inject(method = "tick", at = @At("HEAD"), cancellable = true)
            private void onTick(CallbackInfo ci) {
                MinecraftClient client = MinecraftClient.getInstance();
                
                if (client.player != null) {
                    double distanceSq = client.player.squaredDistanceTo(this.x, this.y, this.z);
                    
                    // 1024 یعنی مجذور فاصله 32 بلاک (32 * 32)
                    // اگر ذره دورتر از 32 بلاک بود، پردازش تیک رو لغو کن تا CPU آزاد بشه
                    if (distanceSq > 1024) {
                        ci.cancel();
                    }
                }
            }
        }
        EOF
        
        echo "=== ساخت فایل‌ها با موفقیت انجام شد ==="

    - name: Setup Gradle Wrapper
      run: gradle wrapper --gradle-version 8.9

    - name: Build Mod with Gradle
      run: ./gradlew build

    - name: Upload Mod Jar Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FPS-Boost-Mod-1.21.1
        path: build/libs/*-1.0.0.jar
