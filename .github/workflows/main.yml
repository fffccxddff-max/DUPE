name: 🚀 SSH via bore (اصلاح شده - قطعی)

on: workflow_dispatch

jobs:
  ssh:
    runs-on: ubuntu-latest
    steps:
      - name: نصب SSH Server
        run: |
          sudo apt update
          sudo apt install -y openssh-server curl

      - name: ساخت کاربر siamese
        run: |
          sudo useradd -m -s /bin/bash siamese
          echo "siamese:RezAYtL789" | sudo chpasswd
          sudo systemctl restart ssh

      - name: نصب bore
        run: |
          curl -L -o bore.tar.gz https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz
          tar xzf bore.tar.gz
          sudo mv bore /usr/local/bin/
          sudo chmod +x /usr/local/bin/bore

      - name: اجرای تونل bore
        id: tunnel
        run: |
          bore local 22 --to bore.pub 2>&1 | tee bore.log &
          sleep 6
          # اصلاح الگو: بدون tcp://
          ADDR=$(grep -o 'bore.pub:[0-9]*' bore.log | head -1)
          if [ -z "$ADDR" ]; then
            echo "خطا - نتوانستیم آدرس را پیدا کنیم. محتوای لاگ:"
            cat bore.log
            exit 1
          fi
          echo "address=$ADDR" >> $GITHUB_OUTPUT
          echo "Tunnel address: $ADDR"

      - name: 🔥 دستور اتصال (کپی کن)
        run: |
          echo ""
          echo "========================================================="
          echo "✅ تونل با موفقیت برقرار شد"
          echo "========================================================="
          echo ""
          echo "👤 کاربر: siamese"
          echo "🔑 رمز: RezAYtL789"
          echo ""
          echo "📌 در ترمینال خودت (Termux) این دستور را بزن:"
          echo ""
          echo "   ssh siamese@${{ steps.tunnel.outputs.address }}"
          echo ""
          echo "مثال: ssh siamese@bore.pub -p 57995"
          echo ""
          echo "⚠️  تونل ۵ ساعت فعال است."
          echo "========================================================="

      - name: نگهداری تا ۵ ساعت
        run: sleep 18000
