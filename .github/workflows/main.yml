name: Siamese Runner - ترکیب دو رانر

on: workflow_dispatch

jobs:
  orchestrator:
    runs-on: ubuntu-latest
    outputs:
      session_id: ${{ steps.gen_id.outputs.session_id }}
    steps:
      - name: تولید شناسه یکتا برای این اجرا
        id: gen_id
        run: |
          SESSION_ID=$(date +%s)-${GITHUB_RUN_ID}
          echo "session_id=$SESSION_ID" >> $GITHUB_OUTPUT
          echo "SESSION_ID=$SESSION_ID" >> $GITHUB_ENV
          
      - name: تقسیم کار به دو بسته
        run: |
          echo "بسته ۱ - داده‌های بخش اول" > task1.txt
          echo "بسته ۲ - داده‌های بخش دوم" > task2.txt
          echo "کاربر گرامی، کار شما بین دو رانر موازی تقسیم شد."
          
      - name: آپلود بسته مخصوص worker1
        uses: actions/upload-artifact@v4
        with:
          name: task1-${{ env.SESSION_ID }}
          path: task1.txt
          retention-days: 1
          
      - name: آپلود بسته مخصوص worker2
        uses: actions/upload-artifact@v4
        with:
          name: task2-${{ env.SESSION_ID }}
          path: task2.txt
          retention-days: 1

  worker1:
    runs-on: ubuntu-latest
    needs: orchestrator
    steps:
      - name: دریافت بسته مخصوص worker1
        uses: actions/download-artifact@v4
        with:
          name: task1-${{ needs.orchestrator.outputs.session_id }}
          
      - name: پردازش سنگین توسط worker1 (۷ گیگ رم، ۲ هسته)
        run: |
          echo "پردازش روی worker1 شروع شد..." 
          cat task1.txt > result1.txt
          echo " - پردازش توسط worker1 با موفقیت انجام شد" >> result1.txt
          echo " - RAM استفاده‌شده: ~7GB (مجازی)" >> result1.txt
          echo " - CPU: 2 هسته" >> result1.txt
          
      - name: آپلود نتیجه worker1
        uses: actions/upload-artifact@v4
        with:
          name: result1-${{ needs.orchestrator.outputs.session_id }}
          path: result1.txt
          retention-days: 1

  worker2:
    runs-on: ubuntu-latest
    needs: orchestrator
    steps:
      - name: دریافت بسته مخصوص worker2
        uses: actions/download-artifact@v4
        with:
          name: task2-${{ needs.orchestrator.outputs.session_id }}
          
      - name: پردازش سنگین توسط worker2 (۷ گیگ رم، ۲ هسته)
        run: |
          echo "پردازش روی worker2 شروع شد..."
          cat task2.txt > result2.txt
          echo " - پردازش توسط worker2 با موفقیت انجام شد" >> result2.txt
          echo " - RAM استفاده‌شده: ~7GB (مجازی)" >> result2.txt
          echo " - CPU: 2 هسته" >> result2.txt
          
      - name: آپلود نتیجه worker2
        uses: actions/upload-artifact@v4
        with:
          name: result2-${{ needs.orchestrator.outputs.session_id }}
          path: result2.txt
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: [worker1, worker2, orchestrator]
    steps:
      - name: دانلود نتایج از هر دو worker
        uses: actions/download-artifact@v4
        with:
          pattern: result[12]-${{ needs.orchestrator.outputs.session_id }}
          merge-multiple: true
          
      - name: ترکیب نتایج و نمایش خروجی نهایی
        run: |
          echo "========== خروجی یکپارچه ==========" > final_output.txt
          echo "" >> final_output.txt
          cat result1.txt >> final_output.txt
          echo "" >> final_output.txt
          cat result2.txt >> final_output.txt
          echo "" >> final_output.txt
          echo "========== پایان ==========" >> final_output.txt
          
          echo "✅ ترکیب با موفقیت انجام شد!"
          echo "-----------------------------------"
          cat final_output.txt
          echo "-----------------------------------"
          
      - name: (اختیاری) آپلود خروجی نهایی برای دانلود
        uses: actions/upload-artifact@v4
        with:
          name: final-output-${{ needs.orchestrator.outputs.session_id }}
          path: final_output.txt
          retention-days: 7
