name: SSH Tunnel to Runner (Cloudflare)

on: workflow_dispatch

jobs:
  tunnel:
    runs-on: ubuntu-latest
    steps:
      - name: نصب SSH Server
        run: |
          sudo apt update
          sudo apt install -y openssh-server curl

      - name: ساخت کاربر siamese
        run: |
          sudo useradd -m -s /bin/bash siamese
          echo "siamese:TempPass2025" | sudo chpasswd
          sudo systemctl restart ssh

      - name: نصب cloudflared
        run: |
          curl -L --output cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: اجرای تونل و نمایش آدرس
        run: |
          cloudflared tunnel --url ssh://localhost:22 > tunnel.log 2>&1 &
          sleep 8
          # استخراج آدرس تصادفی trycloudflare.com
          URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' tunnel.log | head -1)
          if [ -z "$URL" ]; then
            echo "خطا در گرفتن آدرس، لاگ:"
            cat tunnel.log
            exit 1
          fi
          HOST=$(echo $URL | sed 's|https://||')
          echo "✅ تونل فعال شد!"
          echo "----------------------------------------"
          echo "آدرس برای اتصال: $HOST"
          echo "کاربر: siamese"
          echo "رمز: TempPass2025"
          echo "دستور اتصال از Termux:"
          echo "ssh siamese@$HOST"
          echo "----------------------------------------"

      - name: نگهداری tunnel (حداکثر 5 ساعت)
        run: |
          echo "منتظر اتصال شما هستم. تا 5 ساعت فعال می‌ماند..."
          sleep 18000   # 5 ساعت
