name: 🔥 SSH via Cloudflared TCP (نهایی)

on: workflow_dispatch

jobs:
  ssh:
    runs-on: ubuntu-latest
    steps:
      - name: نصب SSH Server
        run: |
          sudo apt update
          sudo apt install -y openssh-server curl

      - name: ساخت کاربر siamese
        run: |
          sudo useradd -m -s /bin/bash siamese
          echo "siamese:RezAYtL789" | sudo chpasswd
          sudo systemctl restart ssh

      - name: نصب cloudflared
        run: |
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: اجرای تونل TCP (تصحیح شده)
        id: tunnel
        run: |
          cloudflared tunnel --url tcp://localhost:22 > tunnel.log 2>&1 &
          sleep 10
          HOST=$(grep -o 'https://[a-z0-9.-]*\.trycloudflare\.com' tunnel.log | head -1 | sed 's|https://||')
          if [ -z "$HOST" ]; then
            echo "خطا - لاگ:"
            cat tunnel.log
            exit 1
          fi
          echo "host=$HOST" >> $GITHUB_OUTPUT

      - name: نمایش دستور اتصال
        run: |
          echo ""
          echo "====================================================="
          echo "✅ تونل TCP برقرار شد"
          echo "====================================================="
          echo "👤 کاربر: siamese"
          echo "🔑 رمز: RezAYtL789"
          echo ""
          echo "دستور اتصال در Termux:"
          echo "ssh -o ProxyCommand=\"cloudflared access tcp --hostname %h\" siamese@${{ steps.tunnel.outputs.host }}"
          echo ""
          echo "اگر خطای 'Remote closed connection' دیدی، این دفعه باید کار کند."
          echo "====================================================="

      - name: نگهداری
        run: sleep 18000
